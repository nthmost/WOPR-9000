<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WOPR-9000</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="shell">

  <div class="main-area">

    <div class="terminal">
      <div class="bezel-bar">
        <div class="file-menu" id="fileMenu">
          <button class="file-menu-btn" id="fileMenuBtn">FILE ▾</button>
          <div class="file-dropdown" id="fileDropdown" hidden></div>
        </div>
        <span class="bezel-title" id="bezelTitle">WOPR-9000</span>
        <span class="bezel-status" id="bezelStatus">READY</span>
      </div>

      <div class="screen" id="screen">
        <div class="output" id="output">
          <div class="boot-msg" id="bootMsg">
            <p>WOPR-9000 DOCUMENT INTERFACE</p>
            <p>LOADING CONTEXT...</p>
            <p>────────────────────────────────────</p>
            <p>SHALL WE PLAY A GAME?</p>
          </div>
          <span class="cursor" id="cursor"></span>
        </div>
      </div>
    </div>

    <!-- Sidebar: hidden until a file with menu options is loaded -->
    <div class="sidebar" id="sidebar" hidden>
      <div class="sidebar-header">
        <span class="sidebar-label" id="sidebarLabel">MENU</span>
        <button class="key key-esc" id="sidebarClose">ESC</button>
      </div>
      <div class="sidebar-keys" id="sidebarKeys"></div>
    </div>

  </div>

  <div class="input-row">
    <div class="input-wrap">
      <textarea
        id="userInput"
        class="user-input"
        placeholder="ask anything..."
        rows="1"
        autofocus
      ></textarea>
    </div>
    <button class="btn btn-enter" id="enterBtn">Enter</button>
    <button class="btn btn-clear" id="clearBtn">Clear</button>
    <button class="btn btn-stop"  id="stopBtn"  disabled>Stop</button>
  </div>

  <div class="status-bar" id="statusBar"></div>

</div>

<script>
(function() {
  // Derive base URL so fetch works at any deployment path (with or without trailing slash)
  const BASE = window.location.pathname.replace(/\/?$/, '/');

  const output    = document.getElementById('output');
  const cursor    = document.getElementById('cursor');
  const screen    = document.getElementById('screen');
  const inputEl   = document.getElementById('userInput');
  const enterBtn  = document.getElementById('enterBtn');
  const clearBtn  = document.getElementById('clearBtn');
  const stopBtn   = document.getElementById('stopBtn');
  const statusBar = document.getElementById('statusBar');
  const bezelStatus = document.getElementById('bezelStatus');
  const bezelTitle  = document.getElementById('bezelTitle');

  let messages  = [];
  let loading   = false;
  let abortCtrl = null;

  // Load config from server
  fetch(BASE + 'config')
    .then(r => r.json())
    .then(cfg => {
      if (cfg.title) {
        bezelTitle.textContent = cfg.title;
        document.title = cfg.title;
      }
    })
    .catch(() => {});

  // Auto-resize textarea
  inputEl.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });

  inputEl.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!loading) send();
    }
  });

  enterBtn.addEventListener('click', () => { if (!loading) send(); });
  clearBtn.addEventListener('click', clear);
  stopBtn.addEventListener('click', stop);

  function clear() {
    messages = [];
    output.innerHTML = '';
    output.appendChild(cursor);
    statusBar.textContent = '';
    setStatus('READY');
    inputEl.focus();
  }

  function stop() {
    if (abortCtrl) { abortCtrl.abort(); abortCtrl = null; }
  }

  function setStatus(s) { bezelStatus.textContent = s; }

  function setLoading(on) {
    loading = on;
    enterBtn.disabled = on;
    stopBtn.disabled = !on;
    inputEl.disabled = on;
    setStatus(on ? 'PROCESSING' : 'READY');
  }

  function send() {
    const text = inputEl.value.trim();
    if (!text) return;

    messages.push({ role: 'user', content: text });
    appendLine('user', text);
    inputEl.value = '';
    inputEl.style.height = 'auto';

    const loadEl = appendLoading();
    setLoading(true);
    statusBar.textContent = '';

    abortCtrl = new AbortController();

    fetch(BASE + 'chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages }),
      signal: abortCtrl.signal,
    })
    .then(r => r.json())
    .then(data => {
      loadEl.remove();
      if (data.error) {
        appendLine('error', '⚠ ' + data.error);
        messages.pop();
      } else {
        messages.push({ role: 'assistant', content: data.content });
        appendLine('assistant', data.content);
        if (data.usage) {
          statusBar.textContent =
            `↑ ${data.usage.input.toLocaleString()} tokens  ↓ ${data.usage.output.toLocaleString()} tokens`;
        }
      }
    })
    .catch(err => {
      loadEl.remove();
      if (err.name !== 'AbortError') {
        appendLine('error', '⚠ ' + err.message);
        messages.pop();
      } else {
        appendLine('error', '// stopped');
      }
    })
    .finally(() => {
      setLoading(false);
      abortCtrl = null;
      inputEl.disabled = false;
      inputEl.focus();
    });
  }

  function appendLine(type, text) {
    cursor.remove();
    const div = document.createElement('div');
    if (type === 'user') {
      div.className = 'line-user';
      div.textContent = text;
    } else if (type === 'assistant') {
      div.className = 'line-assistant';
      div.innerHTML = formatText(text);
    } else {
      div.className = 'line-error';
      div.textContent = text;
    }
    output.appendChild(div);
    output.appendChild(cursor);
    scrollEnd();
    return div;
  }

  function appendLoading() {
    cursor.remove();
    const div = document.createElement('div');
    div.className = 'loading-line';
    div.innerHTML = '<span class="loading-dots"><span>.</span><span>.</span><span>.</span></span>';
    output.appendChild(div);
    output.appendChild(cursor);
    scrollEnd();
    return div;
  }

  function scrollEnd() { screen.scrollTop = screen.scrollHeight; }

  function formatText(text) {
    return text
      .replace(/```[\s\S]*?```/g, m => {
        const code = m.slice(3, -3).replace(/^\w+\n/, '');
        return `<pre><code>${esc(code)}</code></pre>`;
      })
      .replace(/`([^`]+)`/g,  '<code>$1</code>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g,  '<em>$1</em>')
      .replace(/^#{4} (.+)$/gm, '<h4>$1</h4>')
      .replace(/^#{3} (.+)$/gm, '<h3>$1</h3>')
      .replace(/^#{2} (.+)$/gm, '<h2>$1</h2>')
      .replace(/^> (.+)$/gm,  '<blockquote>$1</blockquote>')
      .replace(/^---$/gm,     '<hr>')
      .replace(/\n\n/g, '\n')
      .replace(/\n/g,   '<br>');
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── KEYBOARD PANEL ────────────────────────────────────────────────────

  const sidebar = document.getElementById('sidebar');
  const sidebarKeys  = document.getElementById('sidebarKeys');
  const sidebarLabel = document.getElementById('sidebarLabel');
  const sidebarClose = document.getElementById('sidebarClose');

  sidebarClose.addEventListener('click', hideKeyboard);

  function parseMenuItems(content) {
    // Strategy 1: look for explicit trigger phrase, grab the list that follows.
    // Supports: "offer these menu options", "## MENU", "MENU OPTIONS:", etc.
    const triggerPattern = /offer these menu options|^#+\s*MENU\s*OPTIONS?|^MENU OPTIONS?:/im;
    const triggerMatch = content.search(triggerPattern);

    if (triggerMatch !== -1) {
      // Find end of the trigger line, then parse the list immediately following
      const afterTrigger = content.slice(content.indexOf('\n', triggerMatch) + 1);
      const items = [];
      for (const line of afterTrigger.split('\n')) {
        const m = line.match(/^\s*[\*\-]\s+(.+)$/) || line.match(/^\s*\d+[\.\)]\s+(.+)$/);
        if (m) {
          const text = m[1].trim();
          if (text.length > 4 && text.length < 200) items.push(text);
        } else if (items.length > 0 && line.trim() === '') {
          break; // stop at first blank line after items start
        }
      }
      if (items.length >= 2) return items;
    }

    // Strategy 2: find the single longest contiguous block of list items.
    // Used when no explicit trigger is found.
    const lines = content.split('\n');
    let bestBlock = [], currentBlock = [];
    for (const line of lines) {
      const m = line.match(/^\s*[\*\-]\s+(.+)$/) || line.match(/^\s*\d+[\.\)]\s+(.+)$/);
      if (m) {
        const text = m[1].trim();
        if (text.length > 4 && text.length < 200) { currentBlock.push(text); continue; }
      }
      if (currentBlock.length > bestBlock.length) bestBlock = currentBlock;
      currentBlock = [];
    }
    if (currentBlock.length > bestBlock.length) bestBlock = currentBlock;
    return bestBlock.length >= 3 ? bestBlock : [];
  }

  function showKeyboard(items, filename) {
    sidebarLabel.textContent = filename.replace(/\.md$/, '').replace(/_/g, ' ').toUpperCase();
    sidebarKeys.innerHTML = '';

    items.forEach(item => {
      const btn = document.createElement('button');
      btn.className = 'key key-option';
      btn.textContent = item;
      btn.addEventListener('click', () => {
        hideKeyboard();
        inputEl.value = item;
        inputEl.dispatchEvent(new Event('input'));
        send();
      });
      sidebarKeys.appendChild(btn);
    });

    sidebar.hidden = false;
    requestAnimationFrame(() => {
      sidebar.classList.add('visible');
      document.querySelector('.shell').classList.add('sidebar-open');
    });
  }

  function hideKeyboard() {
    sidebar.classList.remove('visible');
    document.querySelector('.shell').classList.remove('sidebar-open');
    sidebar.addEventListener('transitionend', () => {
      sidebar.hidden = true;
    }, { once: true });
  }

  // ── FILE MENU ──────────────────────────────────────────────────────────

  const fileMenuBtn  = document.getElementById('fileMenuBtn');
  const fileDropdown = document.getElementById('fileDropdown');
  let fileMenuOpen   = false;
  let filesLoaded    = false;

  fileMenuBtn.addEventListener('click', e => {
    e.stopPropagation();
    fileMenuOpen = !fileMenuOpen;
    fileDropdown.hidden = !fileMenuOpen;
    fileMenuBtn.textContent = fileMenuOpen ? 'FILE ▴' : 'FILE ▾';
    if (fileMenuOpen && !filesLoaded) loadFileList();
  });

  document.addEventListener('click', () => {
    if (fileMenuOpen) {
      fileMenuOpen = false;
      fileDropdown.hidden = true;
      fileMenuBtn.textContent = 'FILE ▾';
    }
  });

  fileDropdown.addEventListener('click', e => e.stopPropagation());

  function loadFileList() {
    fileDropdown.innerHTML = '<div class="file-item file-loading">loading...</div>';
    fetch(BASE + 'files')
      .then(r => r.json())
      .then(files => {
        filesLoaded = true;
        if (!files.length) {
          fileDropdown.innerHTML = '<div class="file-item file-empty">no files</div>';
          return;
        }
        fileDropdown.innerHTML = '';
        files.forEach(f => {
          const btn = document.createElement('button');
          btn.className = 'file-item';
          btn.textContent = f.name;
          btn.addEventListener('click', () => openFile(f));
          fileDropdown.appendChild(btn);
        });
      })
      .catch(() => {
        fileDropdown.innerHTML = '<div class="file-item file-empty">error loading files</div>';
      });
  }

  function openFile(f) {
    fileMenuOpen = false;
    fileDropdown.hidden = true;
    fileMenuBtn.textContent = 'FILE ▾';

    // First fetch the file content, then inject into conversation
    fetch(BASE + 'file', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ path: f.path }),
    })
    .then(r => r.json())
    .then(data => {
      if (data.error) {
        appendLine('error', '⚠ ' + data.error);
        return;
      }

      // Show load indicator in terminal
      cursor.remove();
      const header = document.createElement('div');
      header.className = 'line-file-header';
      header.textContent = `── LOADING: ${f.name} ──`;
      output.appendChild(header);
      output.appendChild(cursor);
      scrollEnd();

      // Inject file content as a user message into the conversation
      const userMsg = `[FILE: ${f.name}]\n\n${data.content}`;
      messages.push({ role: 'user', content: userMsg });

      const loadEl = appendLoading();
      setLoading(true);

      abortCtrl = new AbortController();

      fetch(BASE + 'chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages }),
        signal: abortCtrl.signal,
      })
      .then(r => r.json())
      .then(resp => {
        loadEl.remove();
        if (resp.error) {
          appendLine('error', '⚠ ' + resp.error);
          messages.pop();
        } else {
          messages.push({ role: 'assistant', content: resp.content });
          appendLine('assistant', resp.content);
          if (resp.usage) {
            statusBar.textContent =
              `↑ ${resp.usage.input.toLocaleString()} tokens  ↓ ${resp.usage.output.toLocaleString()} tokens`;
          }
          // Parse menu items from the file and show keyboard if found
          const menuItems = parseMenuItems(data.content);
          if (menuItems.length >= 3) showKeyboard(menuItems, f.name);
        }
      })
      .catch(err => {
        loadEl.remove();
        if (err.name !== 'AbortError') {
          appendLine('error', '⚠ ' + err.message);
          messages.pop();
        } else {
          appendLine('error', '// stopped');
        }
      })
      .finally(() => {
        setLoading(false);
        abortCtrl = null;
        inputEl.disabled = false;
        inputEl.focus();
      });
    })
    .catch(err => appendLine('error', '⚠ ' + err.message));
  }
})();
</script>
</body>
</html>
